<main class="estruturaApp">
  <header class="cabecalho">
    <div class="cabecalhoConteudo">
      <div class="cabecalhoTexto">
        <h1>{{ titulo }}</h1>
        <p>Gerenciador de Artistas, Músicas e Letras</p>
      </div>

      @if (imagemCabecalho(); as imagem) {
        <img
          class="imagemCabecalho"
          [ngSrc]="imagem.src"
          [alt]="imagem.alt"
          width="180"
          height="180"
          priority
        />
      }
    </div>
  </header>

  <section class="conteudoPagina">
    <router-outlet />
  </section>
</main>
