<app-dialog-padrao [titulo]="dados.titulo" [mostrarBotaoFechar]="true">
  <form id="formEdicaoLetra" class="formulario" (submit)="$event.preventDefault(); confirmar()">
    <mat-form-field appearance="outline" class="campoInteiro">
      <mat-label>Idioma</mat-label>
      <input matInput [formControl]="idiomaControl" maxlength="80" />
      @if (idiomaControl.invalid && idiomaControl.touched) {
        <mat-error>Informe o idioma da letra.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="campoInteiro">
      <mat-label>Conteúdo da letra</mat-label>
      <textarea matInput rows="11" [formControl]="conteudoControl" maxlength="20000"></textarea>
      @if (conteudoControl.invalid && conteudoControl.touched) {
        <mat-error>Informe o conteúdo da letra.</mat-error>
      }
    </mat-form-field>
  </form>

  <div slotAcoes>
    <button mat-button type="button" (click)="fechar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit" form="formEdicaoLetra">{{ dados.textoAcao }}</button>
  </div>
</app-dialog-padrao>
