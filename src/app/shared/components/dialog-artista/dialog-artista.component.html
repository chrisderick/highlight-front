<h2 mat-dialog-title>{{ dados.titulo }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="campoInteiro">
    <mat-label>Nome do artista</mat-label>
    <input matInput [formControl]="nomeControl" maxlength="120" />
    @if (nomeControl.invalid && nomeControl.touched) {
      <mat-error>Informe um nome válido.</mat-error>
    }
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="fechar()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="confirmar()">{{ dados.textoAcao }}</button>
</mat-dialog-actions>
