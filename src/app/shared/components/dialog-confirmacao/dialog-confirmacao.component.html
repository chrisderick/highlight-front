<app-dialog-padrao [titulo]="dados.titulo">
  <p>{{ dados.mensagem }}</p>

  <div slotAcoes>
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="warn" type="button" (click)="confirmar()">{{ dados.textoConfirmar }}</button>
  </div>
</app-dialog-padrao>
