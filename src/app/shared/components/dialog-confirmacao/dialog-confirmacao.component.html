<h2 mat-dialog-title>{{ dados.titulo }}</h2>

<mat-dialog-content>
  <p>{{ dados.mensagem }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close="false">Cancelar</button>
  <button mat-flat-button color="warn" [mat-dialog-close]="true">{{ dados.textoConfirmar }}</button>
</mat-dialog-actions>
